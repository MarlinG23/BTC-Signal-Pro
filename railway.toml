# Railway deployment configuration for BTC Signal Pro
#
# Setup (Railway dashboard or CLI):
# 1. Create a new project
# 2. Add PostgreSQL service
# 3. Add backend service (root: /backend, Dockerfile)
# 4. Add frontend service (root: /frontend, Dockerfile)
# 5. Set environment variables from .env.example
#
# Backend service variables:
#   DATABASE_URL=${{Postgres.DATABASE_URL}}  (convert to postgresql+asyncpg://...)
#   APP_ENV=production
#   CORS_ORIGINS=https://${{frontend.RAILWAY_PUBLIC_DOMAIN}}
#
# Frontend service variables:
#   BACKEND_HOST=${{backend.RAILWAY_PRIVATE_DOMAIN}}
#   BACKEND_PORT=8000

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
